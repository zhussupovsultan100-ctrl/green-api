<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>UI Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .left {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .right {
            flex: 1;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        textarea {
            resize: none;
        }

        button {
            padding: 10px;
            border: none;
            background: #e0e0e0;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background: #d5d5d5;
        }

        .response-box {
        height: 70vh;
        overflow-y: auto;
        border: 1px solid #ccc;
        padding: 10px;
        background: white;
        white-space: pre-wrap;
        font-family: monospace;
        }

        .label {
            font-size: 14px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- LEFT SIDE -->
    <div class="left">
        <input id="idInstance" placeholder="idInstance">
        <input id="apiToken" placeholder="ApiTokenInstance">

        <button id="getSettingsBtn">getSettings</button>
        <button id="getStateBtn">getStateInstance</button>

        <input type="text" placeholder="Введите номер +7" id="phoneMessage">
        <textarea rows="3" placeholder="Введите сообщение" id="messageText"></textarea>
        <button id="sendMessageBtn">sendMessage</button>

        <input type="text" placeholder="Введите номер +7" id="phoneFile">
        <input type="text" placeholder="Вставьте ссылку на картинку" id="fileUrl">
        <button id="sendFileBtn">sendFileByUrl</button>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <div class="label">Ответ:</div>
        <div class="response-box"></div>
    </div>

</div>
</body>
<script src="script.js"></script>
</html>
